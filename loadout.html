<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trail Weight Manager</title>
    <style>
        :root { --bg-dark: #0a0a0a; --bg-card: #1a1a1a; --bg-lighter: #2a2a2a; --accent: #4fc3f7; --text-main: #ffffff; --text-muted: #888888; --danger: #ef5350; --success: #66bb6a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .dashboard { padding-top: max(40px, env(safe-area-inset-top)); padding-bottom: 15px; padding-left: 20px; padding-right: 20px; background-color: var(--bg-card); border-bottom: 1px solid var(--bg-lighter); flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        .dash-main { text-align: center; }
        .dash-main .stat-title { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        .dash-main .stat-value { font-size: 2.8rem; font-weight: bold; color: var(--text-main); margin-top: 5px; }
        .dash-split { display: flex; justify-content: space-between; background: var(--bg-dark); padding: 12px; border-radius: 8px; border: 1px solid var(--bg-lighter); }
        .stat-box { text-align: center; flex: 1; }
        .stat-box:first-child { border-right: 1px solid var(--bg-lighter); }
        .stat-box .stat-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-box .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--accent); margin-top: 4px; }
        .view-container { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: max(100px, env(safe-area-inset-bottom, 100px)); }
        .view { display: none; }
        .view.active { display: block; }
        h2 { font-size: 1.2rem; margin-top: 0; color: var(--accent); border-bottom: 1px solid var(--bg-lighter); padding-bottom: 8px;}
        .category-group { margin-bottom: 20px; background: var(--bg-card); border-radius: 8px; overflow: hidden; }
        .category-header { background: var(--bg-lighter); padding: 10px 15px; font-weight: bold; display: flex; justify-content: space-between; font-size: 0.95rem; }
        .subtotal { color: var(--text-muted); font-weight: normal; }
        .gear-item { display: flex; align-items: center; padding: 14px 15px; border-bottom: 1px solid var(--bg-lighter); }
        .gear-item:last-child { border-bottom: none; }
        .gear-item.packed { opacity: 0.4; }
        .gear-item.packed .item-name { text-decoration: line-through; }
        .item-checkbox { width: 24px; height: 24px; border: 2px solid var(--text-muted); border-radius: 4px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .gear-item.packed .item-checkbox { background: var(--success); border-color: var(--success); color: white; }
        .item-details { flex-grow: 1; }
        .item-name { font-size: 1.05rem; }
        .item-weight { font-weight: bold; color: var(--accent); font-size: 1.05rem; margin-right: 10px;}
        .item-actions { display: flex; gap: 5px; }
        .action-icon { background: transparent; border: none; font-size: 1.2rem; padding: 5px 8px; cursor: pointer; }
        .action-icon.edit { color: var(--accent); }
        .action-icon.delete { color: var(--danger); }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: var(--bg-dark); border: 1px solid var(--bg-lighter); color: white; padding: 14px; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: var(--bg-dark); padding: 15px; border-radius: 6px; border: 1px solid var(--bg-lighter); }
        .checkbox-group input { width: auto; transform: scale(1.5); margin-left: 5px;}
        .btn-primary { background: var(--accent); color: #000; border: none; width: 100%; padding: 16px; border-radius: 6px; font-size: 1.05rem; font-weight: bold; cursor: pointer; }
        .btn-primary:active { opacity: 0.8; }
        .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); width: 100%; padding: 16px; border-radius: 6px; font-size: 1.05rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .cat-manager-list { list-style: none; padding: 0; margin: 0; }
        .cat-manager-list li { display: flex; justify-content: space-between; padding: 12px; background: var(--bg-card); margin-bottom: 8px; border-radius: 6px; font-size: 1.05rem; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 400px; padding: 20px; border-radius: 12px; border: 1px solid var(--bg-lighter); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--bg-lighter); display: flex; justify-content: space-around; padding-bottom: max(10px, env(safe-area-inset-bottom)); padding-top: 10px; z-index: 100; }
        .nav-btn { background: transparent; border: none; color: var(--text-muted); font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 5px 20px; }
        .nav-btn.active { color: var(--accent); }
        .nav-icon { font-size: 1.6rem; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="dash-main">
            <div class="stat-title">Total Pack Weight</div>
            <div class="stat-value" id="valTotal">0.000<span style="font-size:1.5rem; color:var(--text-muted)">kg</span></div>
        </div>
        <div class="dash-split">
            <div class="stat-box"><div class="stat-title">Base Weight</div><div class="stat-value" id="valBase">0g</div></div>
            <div class="stat-box"><div class="stat-title">Consumables</div><div class="stat-value" id="valCons">0g</div></div>
        </div>
    </div>

    <div class="view-container">
        
        <div id="view-pack" class="view active">
            <div id="pack-list-container"></div>
            <button class="btn-primary" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); margin-top: 20px;" onclick="unpackAll()">Unpack All Items</button>
        </div>

        <div id="view-locker" class="view">
            <h2>Add Gear to Locker</h2>
            <div class="form-group"><label>Item Name</label><input type="text" id="inputName" placeholder="e.g., Titanium Spork"></div>
            <div class="form-group"><label>Weight (grams)</label><input type="number" id="inputWeight" placeholder="0" inputmode="numeric"></div>
            <div class="form-group"><label>Category</label><select id="inputCategory"></select></div>
            <div class="checkbox-group"><input type="checkbox" id="inputConsumable"><label style="margin:0; font-size:1rem; color:white;">Flag as Consumable</label></div>
            <button class="btn-primary" onclick="addGear()">Save Item to Locker</button>
        </div>

        <div id="view-categories" class="view">
            <h2>Trip Settings</h2>
            <div class="form-group"><label>Water (Liters)</label><input type="number" id="tripWater" oninput="saveTripSettings()"></div>
            <div class="form-group"><label>Fuel (g)</label><input type="number" id="tripFuel" oninput="saveTripSettings()"></div>
            <div class="form-group"><label>Canister Tare (g)</label><input type="number" id="tripTare" oninput="saveTripSettings()"></div>
            
            <hr style="border-color: var(--bg-lighter); margin: 20px 0;">
            <h2>Paste CSV Data</h2>
            <div class="form-group">
                <label>Copy your CSV content and paste below:</label>
                <textarea id="csvText" rows="5" placeholder="Paste your CSV content here..."></textarea>
                <button class="btn-primary" style="margin-top: 10px;" onclick="importPastedCSV()">Import Pasted Data</button>
            </div>

            <hr style="border-color: var(--bg-lighter); margin: 30px 0;">
            <h2>Manage Categories</h2>
            <div class="form-group" style="display: flex; gap: 10px;">
                <input type="text" id="inputNewCat" placeholder="New Category Name">
                <button class="btn-primary" style="width: 80px; padding: 10px;" onclick="addCategory()">Add</button>
            </div>
            <ul class="cat-manager-list" id="categoryManagerList"></ul>
            
            <hr style="border-color: var(--bg-lighter); margin: 30px 0;">
            <h2 style="color: var(--danger)">Danger Zone</h2>
            <button class="btn-primary" style="background: transparent; border: 2px solid var(--danger); color: var(--danger);" onclick="factoryReset()">Wipe All Data & Reset</button>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h2>Edit Gear Item</h2>
            <div class="form-group"><label>Item Name</label><input type="text" id="editName"></div>
            <div class="form-group"><label>Weight (grams)</label><input type="number" id="editWeight" inputmode="numeric"></div>
            <div class="form-group"><label>Category</label><select id="editCategory"></select></div>
            <div class="checkbox-group"><input type="checkbox" id="editConsumable"><label style="margin:0; font-size:1rem; color:white;">Flag as Consumable</label></div>
            <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
            <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchView('pack', this)"><span class="nav-icon">🎒</span>List</button>
        <button class="nav-btn" onclick="switchView('locker', this)"><span class="nav-icon">➕</span>Add</button>
        <button class="nav-btn" onclick="switchView('categories', this)"><span class="nav-icon">⚙️</span>Settings</button>
    </div>

<script>
    let categories = [];
    let gearList = [];
    let trip = { water: 0, fuel: 0, tare: 110 };
    let editingItemId = null;

    function init() {
        const savedGear = localStorage.getItem('trailGearList');
        const savedCats = localStorage.getItem('trailCategories');
        const savedTrip = localStorage.getItem('trailTripSettings');
        if (savedGear && savedCats) {
            gearList = JSON.parse(savedGear);
            categories = JSON.parse(savedCats);
        } else {
            categories = ["Packs & Storage", "Shelter", "Sleep System", "Consumables", "Hygiene & LNT", "Worn"];
            gearList = [];
        }
        if (savedTrip) trip = JSON.parse(savedTrip);
        document.getElementById('tripWater').value = trip.water;
        document.getElementById('tripFuel').value = trip.fuel;
        document.getElementById('tripTare').value = trip.tare;
        renderAll();
    }

    function saveData() {
        localStorage.setItem('trailGearList', JSON.stringify(gearList));
        localStorage.setItem('trailCategories', JSON.stringify(categories));
        localStorage.setItem('trailTripSettings', JSON.stringify(trip));
    }

    function saveTripSettings() {
        trip.water = parseFloat(document.getElementById('tripWater').value) || 0;
        trip.fuel = parseFloat(document.getElementById('tripFuel').value) || 0;
        trip.tare = parseFloat(document.getElementById('tripTare').value) || 0;
        saveData(); updateDashboard(); renderPackList();
    }

    function parseCSVLine(text) {
        const result = [];
        let cur = '';
        let inQuotes = false;
        for (let char of text) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur); cur = ''; }
            else cur += char;
        }
        result.push(cur);
        return result;
    }

    function importPastedCSV() {
        const text = document.getElementById('csvText').value;
        if (!text) { alert("Please paste the CSV data first."); return; }
        const lines = text.split('\n');
        if (lines.length < 2) return alert("No data found.");
        
        // Find indices dynamically based on header
        const headers = parseCSVLine(lines[0]);
        const nIdx = headers.findIndex(h => h.trim() === "Item Name");
        const wIdx = headers.findIndex(h => h.trim() === "Item Weight");
        const cIdx = headers.findIndex(h => h.trim() === "Pack Category");
        const oIdx = headers.findIndex(h => h.trim() === "Consumable");

        if (nIdx === -1 || wIdx === -1) return alert("Could not find required columns in your data.");

        let addedCount = 0;
        for(let i=1; i<lines.length; i++) {
            if(lines[i].trim() === "") continue;
            const cols = parseCSVLine(lines[i]);
            if(cols.length > Math.max(nIdx, wIdx, cIdx, oIdx)) {
                const name = cols[nIdx].trim();
                const weight = parseFloat(cols[wIdx]);
                const category = (cIdx !== -1) ? cols[cIdx].trim() : "Uncategorized";
                const isConsumable = (oIdx !== -1) ? cols[oIdx].trim().toLowerCase() === 'true' : false;
                
                gearList.push({ id: Date.now()+i, name, weight: isNaN(weight) ? 0 : weight, category, consumable: isConsumable, packed: false });
                if(category !== "Uncategorized" && !categories.includes(category)) categories.push(category);
                addedCount++;
            }
        }
        saveData(); renderAll(); alert("Import complete! Added " + addedCount + " items.");
        document.getElementById('csvText').value = "";
    }

    function renderAll() { updateDashboard(); renderPackList(); renderCategorySelect(); renderCategoryManager(); }

    function updateDashboard() {
        let base = 0, cons = 0;
        gearList.forEach(item => { if (item.consumable || item.category === "Worn") cons += item.weight; else base += item.weight; });
        cons += (trip.water * 1000) + trip.fuel + trip.tare;
        document.getElementById('valBase').innerText = base + 'g';
        document.getElementById('valCons').innerText = cons + 'g';
        document.getElementById('valTotal').innerHTML = ((base + cons) / 1000).toFixed(3) + '<span style="font-size:1.5rem; color:var(--text-muted)">kg</span>';
    }

    function renderPackList() {
        const container = document.getElementById('pack-list-container');
        container.innerHTML = '';
        categories.forEach(cat => {
            const items = gearList.filter(g => g.category === cat);
            if (items.length === 0) return;
            let subtotal = items.reduce((s, i) => s + i.weight, 0);
            if(cat === "Consumables") subtotal += (trip.water * 1000) + trip.fuel + trip.tare;
            let html = `<div class="category-group"><div class="category-header"><span>${cat}</span><span class="subtotal">${subtotal}g</span></div>`;
            items.forEach(item => {
                html += `<div class="gear-item ${item.packed ? 'packed' : ''}" onclick="togglePacked(${item.id})">
                    <div class="item-checkbox">${item.packed ? '✓' : ''}</div>
                    <div class="item-details"><div class="item-name">${item.name}</div></div>
                    <div class="item-weight">${item.weight}g</div>
                    <div class="item-actions"><button class="action-icon edit" onclick="openEditModal(${item.id}, event)">✏️</button><button class="action-icon delete" onclick="deleteGear(${item.id}, event)">❌</button></div>
                </div>`;
            });
            container.innerHTML += html + `</div>`;
        });
    }

    function renderCategorySelect() {
        const html = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        document.getElementById('inputCategory').innerHTML = html;
        document.getElementById('editCategory').innerHTML = html;
    }

    function renderCategoryManager() {
        document.getElementById('categoryManagerList').innerHTML = categories.map(cat => `<li><span>${cat}</span></li>`).join('');
    }

    function addGear() {
        const name = document.getElementById('inputName').value;
        const weight = parseInt(document.getElementById('inputWeight').value);
        if (!name || !weight) return;
        gearList.push({ id: Date.now(), name, weight, category: document.getElementById('inputCategory').value, consumable: document.getElementById('inputConsumable').checked, packed: false });
        saveData(); renderAll(); switchView('pack', document.querySelector('.nav-btn'));
    }

    function openEditModal(id, e) {
        e.stopPropagation(); editingItemId = id;
        const item = gearList.find(g => g.id === id);
        document.getElementById('editName').value = item.name;
        document.getElementById('editWeight').value = item.weight;
        document.getElementById('editCategory').value = item.category;
        document.getElementById('editConsumable').checked = item.consumable;
        document.getElementById('editModal').classList.add('active');
    }

    function saveEdit() {
        const item = gearList.find(g => g.id === editingItemId);
        item.name = document.getElementById('editName').value;
        item.weight = parseInt(document.getElementById('editWeight').value);
        item.category = document.getElementById('editCategory').value;
        item.consumable = document.getElementById('editConsumable').checked;
        saveData(); renderAll(); document.getElementById('editModal').classList.remove('active');
    }

    function togglePacked(id) { gearList.find(g => g.id === id).packed ^= 1; saveData(); renderPackList(); }
    function deleteGear(id, e) { e.stopPropagation(); gearList = gearList.filter(g => g.id !== id); saveData(); renderAll(); }
    function unpackAll() { gearList.forEach(g => g.packed = false); saveData(); renderPackList(); }
    function switchView(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    init();
</script>
</body>
</html>
